name: MobSF dynamic scan (experimental)

# EXPERIMENTAL — manual only. Boots an Android-9 emulator and runs MobSF dynamic
# analysis. Fragile by nature; steps are best-effort and never gate a release.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag whose APK to dynamically scan"
        required: true
      publish:
        description: "Attach the dynamic report to the release?"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  dynamic:
    runs-on: ubuntu-latest          # must be x86_64 (KVM)
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download APK
        run: |
          mkdir -p dist out
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*.apk' --dir dist --clobber
          shopt -s nullglob
          apks=(dist/*.apk)
          apk="${apks[0]:-}"
          [ -n "$apk" ] || { echo "no APK asset on $TAG"; exit 1; }
          echo "APK=$apk" >> "$GITHUB_ENV"

      - name: Generate MobSF key
        run: |
          k="$(openssl rand -hex 32)"; echo "::add-mask::$k"
          echo "MOBSF_API_KEY=$k" >> "$GITHUB_ENV"

      - name: Run dynamic analysis on emulator
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2   # pin to a SHA before relying on it
        with:
          api-level: 28
          target: google_apis        # NEVER google_apis_playstore (cannot root)
          arch: x86_64
          profile: pixel_5
          force-avd-creation: true
          disable-animations: true
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -writable-system -gpu swiftshader_indirect
          script: bash tool/mobsf-dynamic.sh "$APK" out

      - name: Upload dynamic report artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobsf-dynamic-${{ env.TAG }}
          path: out/
          if-no-files-found: warn

      - name: Attach to release (optional)
        if: ${{ inputs.publish && hashFiles('out/dynamic-report.json') != '' }}
        run: |
          cp out/dynamic-report.json "mobsf-dynamic-${TAG}.json"
          gh release upload "$TAG" "mobsf-dynamic-${TAG}.json" --repo "$GITHUB_REPOSITORY" --clobber
